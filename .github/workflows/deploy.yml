name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Branch to deploy"
        required: true
        default: "develop"
        type: choice
        options:
          - develop
          - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on droplet via SSH
        env:
          TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_branch || github.ref_name }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DROPLET_HOST }}
          port: 22
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 30m
          envs: TARGET_BRANCH
          script: |
            set -euo pipefail
            cd /home/devluisq/project/sasa_forge_v2.0
            chmod +x deploy.sh
            ./deploy.sh "${TARGET_BRANCH}"
